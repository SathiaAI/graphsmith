<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">
  <rect x="1" y="1" width="758" height="498" rx="10" fill="#0a0e14" stroke="#22303f"/>
  <rect x="1" y="1" width="758" height="40" rx="10" fill="#0d1420"/>
  <rect x="1" y="30" width="758" height="11" fill="#0d1420"/>
  <line x1="1" y1="41" x2="759" y2="41" stroke="#1c2836"/>
  <circle cx="20" cy="21" r="5" fill="#e5342a" opacity="0.55"/>
  <circle cx="38" cy="21" r="5" fill="#f5a623" opacity="0.55"/>
  <circle cx="56" cy="21" r="5" fill="#2ea043" opacity="0.55"/>
  <text x="74" y="25" font-size="11" fill="#7d8ea0">real chaos.js run &#183; kill-tested on Linux + Windows in CI</text>
  <g font-size="13">
    <text x="22" y="74" fill="#5f7488">$ node manager.js kt</text>
    <text x="22" y="96" fill="#9fb0c0">{"runId":"kt","step":"01-gather","status":"ok","ms":310}</text>
    <text x="22" y="118" fill="#ff6b5e" font-weight="700">&#10007;  SIGKILL &#8212; crash mid-run (power loss)</text>
    <text x="22" y="140" fill="#5f7488">$ node manager.js kt          # same command &#8594; resumes</text>
    <text x="22" y="162" fill="#9fb0c0">{"step":"__lock__","status":"stale lock (pid 2679 not running) &#8212; stolen"}</text>
    <text x="22" y="184" fill="#9fb0c0">{"step":"01-gather","status":"skipped (checkpoint exists)"}   &#8592; not redone</text>
    <text x="22" y="206" fill="#9fb0c0">{"step":"02-process","status":"ok","ms":304}</text>
    <text x="22" y="228" fill="#9fb0c0">{"step":"03-deliver","status":"ok","ms":306}</text>
    <text x="22" y="250" fill="#9fb0c0">{"step":"__done__","status":"complete"}</text>
    <text x="22" y="272" fill="#5f7488">$ node scripts/chaos.js demo</text>
    <text x="22" y="296" fill="#f5a623"><tspan fill="#2ea043" font-weight="700">&#10003;</tspan> Kill landed MID-FLIGHT after 1/3 checkpoint(s)</text>
    <text x="22" y="318" fill="#f5a623"><tspan fill="#2ea043" font-weight="700">&#10003;</tspan> restart resumed from save points &#8212; no finished work redone</text>
    <text x="22" y="340" fill="#f5a623"><tspan fill="#2ea043" font-weight="700">&#10003;</tspan> every recorded side effect ran exactly once</text>
    <text x="22" y="362" fill="#f5a623"><tspan fill="#2ea043" font-weight="700">&#10003;</tspan> power-loss state HALTED loudly instead of re-sending</text>
    <text x="22" y="384" fill="#f5a623"><tspan fill="#2ea043" font-weight="700">&#10003;</tspan> concurrent run refused &#183; dead lock stolen &#183; pid-reuse handled</text>
    <text x="22" y="410" fill="#ffce6b" font-weight="700" letter-spacing="0.5">&#187;  ALL CHECKS PASSED</text>
  </g>
  <line x1="1" y1="440" x2="759" y2="440" stroke="#1c2836"/>
  <rect x="1" y="440" width="758" height="59" rx="10" fill="#0d1420"/>
  <rect x="1" y="440" width="758" height="20" fill="#0d1420"/>
  <text x="22" y="474" font-size="12"><tspan fill="#f5a623" font-weight="700">Reproduce it &#8594;</tspan><tspan fill="#c6d0da">  github.com/SathiaAI/graphsmith  &#183;  run the kill test yourself in ~30s</tspan></text>
</svg>
