name: Publish to npm

# Publishes graphsmith-skill to npm whenever a GitHub Release is published.
# Requires an npm granular access token with publish rights saved as the
# NPM_TOKEN repository secret (Settings > Secrets and variables > Actions).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
